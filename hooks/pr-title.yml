# PR Title Format — CI template.
#
# Copy to .github/workflows/pr-title.yml in your repo.
#
# Squash-merge uses the PR title as the commit message, so the title must
# follow the Conventional Commits pattern. This rejects titles like "wip:
# stuff" or "Update component" before they can merge. It mirrors the local
# commit-msg hook (hooks/commit-msg) so local and server checks agree.
#
# Adjust the `branches` list and `types` to match your project.

name: PR Title Format

on:
  pull_request:
    # Target branch(es) PRs merge into. Add your integration branch if it
    # differs from the default branch.
    branches: [main]
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  pr-title:
    name: PR Title Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check PR title follows Conventional Commits
        # Pinned to a commit SHA (supply-chain hygiene). v6.1.1.
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep this list in sync with hooks/commit-msg.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Scopes like feat(loader): are allowed but not required.
          requireScope: false
          # Subject may start upper-case but must not be ALL-CAPS — matches
          # the commit-msg hook's subject check.
          subjectPattern: ^(?![A-Z]{2,}).+$
          subjectPatternError: |
            The subject "{subject}" in the PR title "{title}" must not be ALL-CAPS.
            Example valid titles:
              feat: add a new skill loader
              fix(parser): handle an empty input file
              chore: bump pinned action versions
